<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loot Tracker</title>

  <!-- CSS styles -->
  <style>
    body {
      background: #1a1a2e;
      color: white;
      font-family: Georgia, serif;
      padding: 20px;
      line-height: 1.6;
    }

    h1 {
      text-align: center;
      color: #f0c040;
      margin-bottom: 10px;
    }

    .page-layout {
      display: flex; /* simple two-column layout */
      gap: 20px;
      max-width: 800px;
      margin: 0 auto;
    }

    .form-panel {
      background: #16213e;
      padding: 20px;
      width: 300px;
      border: 1px solid #333355;
    }

    label {
      display: block;
      margin-bottom: 5px;
      color: #bbbbbb;
    }

    input {
      width: 100%;
      padding: 8px;
      margin-bottom: 15px;
      background: #0f3460;
      border: 1px solid #446688;
      color: white;
    }

    /* visible focus ring for accessibility */
    input:focus {
      outline: 2px solid #f0c040;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #f0c040;
      color: #1a1a2e;
      border: none;
      cursor: pointer;
      font-weight: bold;
    }

    button:focus {
      outline: 2px solid white;
    }

    #validation-message {
      color: #ff6b6b;
      min-height: 20px;
      margin-top: 10px;
    }

    .results-panel {
      flex: 1;
    }

    .loot-list-box,
    .total-box {
      background: #16213e;
      padding: 20px;
      border: 1px solid #333355;
      margin-bottom: 20px;
    }

    #loot-list {
      list-style: none;
      padding: 0;
    }

    #loot-list li {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid #2a2a4a;
    }

    .item-name {
      color: white;
    }

    .item-value {
      color: #f0c040;
      font-weight: bold;
    }

    .empty-msg {
      color: #999999;
      font-style: italic;
    }

    #total-value {
      font-size: 1.4rem;
      color: #f0c040;
      font-weight: bold;
    }
  </style>
</head>

<body>

  <h1>Loot Tracker</h1>

  <div class="page-layout">

    <!-- Left side: form -->
    <div class="form-panel">
      <h2>Add Loot</h2>

      <!-- label + input for accessibility -->
      <label for="loot-name">Item Name</label>
      <input type="text" id="loot-name" placeholder="e.g. Sword">

      <label for="loot-value">Gold Value</label>
      <input type="number" id="loot-value" placeholder="e.g. 50">

      <button id="add-btn">Add Loot</button>

      <!-- validation message goes here -->
      <p id="validation-message"></p>
    </div>

    <!-- Right side: results -->
    <div class="results-panel">

      <div class="loot-list-box">
        <h2>Loot Inventory</h2>
        <ul id="loot-list">
          <li class="empty-msg">No loot yet.</li>
        </ul>
      </div>

      <div class="total-box">
        <h2>Total</h2>
        <p id="total-value">0 gp</p>
      </div>

    </div>
  </div>

  <!-- Beginner JS (simple logic) -->
  <script>
    let lootArray = [];

    let nameInput = document.getElementById("loot-name");
    let valueInput = document.getElementById("loot-value");
    let addBtn = document.getElementById("add-btn");
    let lootList = document.getElementById("loot-list");
    let totalDisplay = document.getElementById("total-value");
    let validationMsg = document.getElementById("validation-message");

    addBtn.addEventListener("click", function () {

      let itemName = nameInput.value.trim();
      let itemValue = valueInput.value.trim();

      validationMsg.textContent = "";

      if (itemName === "") {
        validationMsg.textContent = "Item name cannot be empty.";
        nameInput.focus();
        return;
      }

      if (itemValue === "" || isNaN(itemValue)) {
        validationMsg.textContent = "Gold value must be a number.";
        valueInput.focus();
        return;
      }

      let numValue = Number(itemValue);
      if (numValue < 0) {
        validationMsg.textContent = "Gold value cannot be negative.";
        valueInput.focus();
        return;
      }

      let lootItem = {
        name: itemName,
        value: numValue
      };

      lootArray.push(lootItem);

      renderLoot();

      nameInput.value = "";
      valueInput.value = "";
      nameInput.focus();
    });

    function renderLoot() {
      lootList.innerHTML = "";

      for (let i = 0; i < lootArray.length; i++) {
        let li = document.createElement("li");

        let nameSpan = document.createElement("span");
        nameSpan.classList.add("item-name");
        nameSpan.textContent = lootArray[i].name;

        let valueSpan = document.createElement("span");
        valueSpan.classList.add("item-value");
        valueSpan.textContent = lootArray[i].value + " gp";

        li.appendChild(nameSpan);
        li.appendChild(valueSpan);
        lootList.appendChild(li);
      }

      let total = 0;
      for (let i = 0; i < lootArray.length; i++) {
        total += lootArray[i].value;
      }

      totalDisplay.textContent = total.toLocaleString() + " gp";
    }
  </script>

</body>
</html>
